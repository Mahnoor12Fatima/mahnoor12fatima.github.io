{{ define "main" }}
<div class="p-4">
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
        {{ range .Params.images }}
        <!-- Loop through images -->
        <a href="{{ .link }}" target="_blank" class="block group relative overflow-hidden rounded-lg shadow-lg">
            <!-- Image -->
            <img 
                src="{{ .src }}" 
                alt="{{ .alt }}" 
                class="w-full h-auto transition-transform transform"
            >
            <!-- Blue overlay on hover -->
            <div 
                class="absolute inset-0 bg-blue-500 bg-opacity-50 transition-opacity opacity-0 group-hover:opacity-80"
            ></div>
            <!-- Image name (alt text) -->
            <div 
                class="absolute inset-0 flex items-center justify-center text-white text-sm opacity-0 group-hover:opacity-100 transition-opacity"
            >
            
                {{ .alt }}
            </div>
        </a>
        {{ end }}
    </div>
</div>
{{ end }}
